name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          channels: conda-forge,bioconda,defaults
          activate-environment: gigatyper

      - name: Install dependencies
        run: conda install -y rich-click pytest

      - name: Run tests
        run: pytest tests/ -v
